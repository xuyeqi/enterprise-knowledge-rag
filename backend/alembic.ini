# Alembic configuration must remain ASCII-only because Python ConfigParser reads
# this file with the Windows locale encoding before Alembic starts.
[alembic]
script_location = migrations
prepend_sys_path = .

# Include the creation date and revision in generated migration filenames.
file_template = %%(year)d%%(month).2d%%(day).2d_%%(rev)s_%%(slug)s

# Write generated migration files with UTF-8 encoding.
output_encoding = utf-8
